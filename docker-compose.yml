services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: youtube_video_chat_app_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ChordMini backend (MIT, github.com/ptnghia-j/ChordMiniApp) — deep-learning
  # chord recognition used by the analyzer.  Heavy: ~5-7GB image, ~2GB RAM.
  # Run `sh scripts/setup_chordmini.sh` once before building — the model
  # weights are git submodules, which Docker git-URL contexts can't fetch.
  chordmini:
    build:
      context: ./vendor/ChordMiniApp/python_backend
    # Their default is 2 preloaded gunicorn workers; 1 halves the RAM bill.
    command: gunicorn --bind 0.0.0.0:8080 --workers 1 --timeout 600 --preload app:app
    ports:
      - "8080:8080"

  analyzer:
    build:
      context: ./analyzer
    environment:
      CHORDMINI_URL: http://chordmini:8080
    depends_on:
      chordmini:
        condition: service_started
    ports:
      # Published so a host-run `mix phx.server` can reach it on localhost:8000
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db/youtube_video_chat_app_dev
      PHX_HOST: localhost
      SECRET_KEY_BASE: ysF8H3vkCxQPQ5GHJrvLxNyVkQTNE2Lx8vY3N7gJ6UQKjmXGpvRrQTx1234567890
      MIX_ENV: dev
      ANALYZER_URL: http://analyzer:8000
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      analyzer:
        condition: service_started
    volumes:
      # Mount source code for hot reloading
      - .:/app
      # Prevent node_modules and build folders from being overwritten
      - /app/_build
      - /app/deps
      - /app/assets/node_modules
      - /app/.elixir_ls
    stdin_open: true
    tty: true
    command: >
      sh -c "
        echo 'Fetching dependencies...' &&
        mix deps.get &&
        echo 'Waiting for database...' &&
        while ! pg_isready -h db -p 5432 -U postgres; do sleep 1; done &&
        echo 'Database is ready!' &&
        echo 'Building assets...' &&
        mix assets.build &&
        mix ecto.create &&
        mix ecto.migrate &&
        mix run priv/repo/seeds.exs &&
        echo 'Starting Phoenix server...' &&
        mix phx.server
      "

volumes:
  postgres_data:
